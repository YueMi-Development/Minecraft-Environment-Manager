name: Publish API & Build

on:
  push:
    branches:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Universal JAR
        run: ./gradlew :core-universal:shadowJar --no-daemon

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/heads/v') || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: core-universal/build/libs/*-universal.jar
          generate_release_notes: true

      - name: Publish to Yuemi Maven
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew :core-api:publish --no-daemon
