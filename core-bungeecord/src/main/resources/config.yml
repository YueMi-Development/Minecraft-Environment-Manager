# Environment Manager Configuration
config-version: 1

# Global environment variables that can be referenced in targets
environments:
  DB_HOST: "localhost"
  DB_USER: "root"
  STAGING: "true"

  # Examples of new features:
  # Bulk loading from a .env file (Last-in Wins / LIFO)
  # "@": ".env"

  # Loading a specific key from a .env file
  # DB_PASSWORD: "@secrets/.env"

  # Loading the entire content of a file (non-.env)
  # PROMOTIONAL_TEXT: "@promo.txt"

# Hijack Configuration (Requires Java Agent)
# If enabled, changes are applied in-memory and intercepted at the JVM level.
# No physical files are modified on disk.
hijack:
  enabled: false

# Definitions of files to be updated by this plugin
# Each target specifies a file path and a mapping of keys in that file to environment variables.
targets:
